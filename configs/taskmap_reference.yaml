# TaskMap reference configuration (Table 2)
# Paper Section 4.6: primary hyperparameters

backbone: "Qwen/Qwen2.5-1.5B"
dtype: "bfloat16"

# TaskMap architecture
block_size: 128
active_fraction: 0.50    # rho
code_dim: 32             # d_z
rank: 8                  # r (low-rank residual dimension)
mapper_hidden: 512

# Training
max_seq_length: 2048
global_batch_tokens: 65536
microbatch_size: 4
gradient_accumulation_steps: 8
max_steps: 12000
warmup_fraction: 0.03    # 3% dense warmup

# Gumbel annealing
gumbel_temp_start: 1.0
gumbel_temp_end: 0.1
sparsity_anneal: "cosine"  # 7% sparsity anneal after 3% warmup

# Optimizer (separate LRs for codes vs projectors)
optimizer: "adamw"
code_learning_rate: 2.0e-3
projector_learning_rate: 2.0e-4
weight_decay: 0.01
adam_beta1: 0.9
adam_beta2: 0.95
lr_scheduler: "cosine"

# Loss weights (lambda)
lambda_bud: 0.05
lambda_topo: 0.01
lambda_bal: 0.01
lambda_stab: 1.0e-3
lambda_sm: 1.0e-3
lambda_align: 1.0e-4

# Eval
eval_every: 1000
save_every: 2000

# Seeds
seeds: [42, 137, 2024]

# Output
output_dir: "outputs/taskmap_reference"
