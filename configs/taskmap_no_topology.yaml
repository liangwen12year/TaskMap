# TaskMap config WITHOUT topology loss (ablation)
# Tests whether topology loss causes the 7B math regression

backbone: "Qwen/Qwen2.5-1.5B"
dtype: "bfloat16"

block_size: 128
active_fraction: 0.50
code_dim: 32
rank: 8
mapper_hidden: 512

max_seq_length: 2048
global_batch_tokens: 65536
microbatch_size: 4
gradient_accumulation_steps: 8
max_steps: 12000
warmup_fraction: 0.03

gumbel_temp_start: 1.0
gumbel_temp_end: 0.1
sparsity_anneal: "cosine"

optimizer: "adamw"
code_learning_rate: 2.0e-3
projector_learning_rate: 2.0e-4
weight_decay: 0.01
adam_beta1: 0.9
adam_beta2: 0.95
lr_scheduler: "cosine"

# Topology loss DISABLED
lambda_bud: 0.05
lambda_topo: 0.0
lambda_bal: 0.01
lambda_stab: 1.0e-3
lambda_sm: 1.0e-3
lambda_align: 1.0e-4

eval_every: 1000
save_every: 2000
seeds: [42]
output_dir: "outputs/taskmap_no_topology"
