apiVersion: v1
kind: Pod
metadata:
  name: taskmap-frozen
  namespace: taskmap-training
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: pokprod-b93r38s1
  containers:
  - name: trainer
    image: nvcr.io/nvidia/pytorch:24.07-py3
    command: ["/bin/bash", "-c"]
    securityContext:
      runAsUser: 0
    args:
    - |
      nvidia-smi | head -5 &&
      pip install -q 'transformers>=4.40,<4.50' 'peft>=0.10,<0.15' 'accelerate>=0.30,<0.35' datasets rouge-score sacrebleu sentencepiece tqdm pyyaml &&
      git clone https://github.com/liangwen12year/TaskMap.git /workspace/TaskMap &&
      cd /workspace/TaskMap &&
      echo "=== Frozen base evaluation ===" &&
      python -u run_eval.py --mode frozen --backbone Qwen/Qwen2.5-1.5B \
        --output_file outputs/eval_frozen.json --max_examples 500 &&
      echo "=== RESULTS ===" &&
      cat outputs/eval_frozen.json &&
      echo "=== DONE ==="
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 80Gi
        cpu: "16"
      requests:
        nvidia.com/gpu: 1
        memory: 40Gi
        cpu: "8"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: workspace
    emptyDir:
      sizeLimit: 100Gi
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi
