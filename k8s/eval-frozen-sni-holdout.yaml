apiVersion: v1
kind: Pod
metadata:
  name: taskmap-frozen-sni-holdout
  namespace: taskmap-training
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: pokprod-b93r38s1
  containers:
  - name: trainer
    image: nvcr.io/nvidia/pytorch:24.07-py3
    command: ["/bin/bash", "-c"]
    securityContext:
      runAsUser: 0
    args:
    - |
      nvidia-smi | head -5 &&
      pip install -q 'transformers>=4.40,<4.50' 'peft>=0.10,<0.15' 'accelerate>=0.30,<0.35' datasets rouge-score sacrebleu sentencepiece tqdm pyyaml &&
      git clone https://github.com/liangwen12year/TaskMap.git /workspace/TaskMap &&
      cd /workspace/TaskMap &&
      echo "=== Frozen baseline on 20 held-out SNI tasks ===" &&
      python -u -c "
import sys, json, torch, numpy as np
sys.path.insert(0, '.')
from models.backbone import load_backbone
from data.task_collection import HOLDOUT_TASKS_SNI, load_sni_dataset, filter_sni_tasks, format_sni_examples
from eval import evaluate_task
from train import set_seed

set_seed(42)
device = 'cuda'
print('Loading backbone...')
model, tokenizer = load_backbone('Qwen/Qwen2.5-1.5B')
model = model.to(device)
model.eval()

print('Loading SNI dataset...')
full_ds = load_sni_dataset()
raw = filter_sni_tasks(full_ds, HOLDOUT_TASKS_SNI, 2000)

scores = {}
for tid in HOLDOUT_TASKS_SNI:
    if tid not in raw:
        print(f'  {tid}: NOT FOUND')
        continue
    examples = format_sni_examples(tid, raw[tid], 'validation')
    if not examples:
        continue
    if len(examples) > 200:
        examples = examples[:200]
    avg_len = np.mean([len(ex['response'].split()) for ex in examples[:20]])
    metric = 'accuracy' if avg_len < 5 else 'rouge_l'
    max_tok = 32 if avg_len < 5 else 128
    s = evaluate_task(model, tokenizer, tid, examples, metric, max_tok, device)
    scores[tid] = s
    print(f'  {tid}: {s}')

print()
print('=== FROZEN BASELINE RESULTS ===')
print(json.dumps(scores, indent=2, default=str))
print('=== END ===')
      " &&
      echo "=== DONE ==="
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 80Gi
        cpu: "16"
      requests:
        nvidia.com/gpu: 1
        memory: 40Gi
        cpu: "8"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    - name: shm
      mountPath: /dev/shm
    env:
    - name: HF_TOKEN
      value: "SET_YOUR_HF_TOKEN_HERE"
  volumes:
  - name: workspace
    emptyDir:
      sizeLimit: 100Gi
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi
