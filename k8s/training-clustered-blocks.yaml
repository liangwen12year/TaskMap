apiVersion: v1
kind: Pod
metadata:
  name: taskmap-clustered-blocks
  namespace: taskmap-training
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: pokprod-b93r38s1
  containers:
  - name: trainer
    image: nvcr.io/nvidia/pytorch:24.07-py3
    command: ["/bin/bash", "-c"]
    securityContext:
      runAsUser: 0
    env:
    - name: TASKMAP_EVAL_EXAMPLES
      value: "500"
    args:
    - |
      nvidia-smi | head -5 &&
      pip install -q 'transformers>=4.40,<4.50' 'peft>=0.10,<0.15' 'accelerate>=0.30,<0.35' datasets rouge-score sacrebleu sentencepiece tqdm pyyaml scikit-learn &&
      git clone https://github.com/liangwen12year/TaskMap.git /workspace/TaskMap &&
      cd /workspace/TaskMap &&

      echo "=== Step 1: Neuron clustering ===" &&
      python -u -m analysis.neuron_clustering \
        --backbone Qwen/Qwen2.5-1.5B \
        --num_examples 500 \
        --block_size 128 \
        --output_file cluster_permutations.pt \
        --seed 42 &&

      echo "=== Step 2: Train TaskMap with clustered blocks ===" &&
      python -u train_taskmap_clustered.py \
        --config configs/taskmap_reference.yaml \
        --backbone Qwen/Qwen2.5-1.5B \
        --max_steps 6000 \
        --active_fraction 0.75 \
        --unfreeze_mapper \
        --cluster_file cluster_permutations.pt \
        --seed 42 &&

      echo "=== DONE ==="
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 80Gi
        cpu: "16"
      requests:
        nvidia.com/gpu: 1
        memory: 64Gi
        cpu: "8"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: workspace
    emptyDir:
      sizeLimit: 100Gi
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 32Gi
