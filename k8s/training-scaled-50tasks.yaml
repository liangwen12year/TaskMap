apiVersion: v1
kind: Pod
metadata:
  name: taskmap-scaled-50tasks
  namespace: taskmap-training
  labels:
    experiment: taskmap-scaled-sni
    tasks: "50plus"
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: pokprod-b93r38s1
  containers:
  - name: trainer
    image: nvcr.io/nvidia/pytorch:24.07-py3
    command: ["/bin/bash", "-c"]
    securityContext:
      runAsUser: 0
    args:
    - |
      nvidia-smi | head -5 &&
      echo "=== Installing dependencies ===" &&
      pip install -q \
        'transformers>=4.40,<4.50' \
        'peft>=0.10,<0.15' \
        'accelerate>=0.30,<0.35' \
        datasets \
        rouge-score \
        sacrebleu \
        sentencepiece \
        tqdm \
        pyyaml &&
      echo "=== Cloning TaskMap ===" &&
      git clone https://github.com/liangwen12year/TaskMap.git /workspace/TaskMap &&
      cd /workspace/TaskMap &&
      echo "=== Skipping pre-download, training script handles it ===" &&
      echo "=== Starting scaled 50-task training ===" &&
      python -u train_taskmap_scaled.py \
        --backbone Qwen/Qwen2.5-1.5B \
        --max_steps 12000 \
        --seed 42 \
        --max_per_task 2000 \
        --max_eval_examples 200 \
        --save_every 3000 \
        --output_dir outputs/taskmap_scaled_50 &&
      echo "=== Copying results ===" &&
      cp outputs/taskmap_scaled_50/results.json /workspace/results.json 2>/dev/null || true &&
      echo "=== DONE ==="
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 80Gi
        cpu: "16"
      requests:
        nvidia.com/gpu: 1
        memory: 48Gi
        cpu: "8"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    - name: shm
      mountPath: /dev/shm
    - name: hf-cache
      mountPath: /root/.cache/huggingface
    env:
    - name: HF_HOME
      value: /root/.cache/huggingface
    - name: TOKENIZERS_PARALLELISM
      value: "false"
    - name: TASKMAP_EVAL_EXAMPLES
      value: "200"
    - name: HF_TOKEN
      value: "SET_YOUR_HF_TOKEN_HERE"
  volumes:
  - name: workspace
    emptyDir:
      sizeLimit: 150Gi
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi
  - name: hf-cache
    emptyDir:
      sizeLimit: 50Gi
