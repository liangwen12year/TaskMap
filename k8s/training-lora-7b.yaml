apiVersion: v1
kind: Pod
metadata:
  name: taskmap-lora-7b
  namespace: taskmap-training
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: pokprod-b93r38s1
  containers:
  - name: trainer
    image: nvcr.io/nvidia/pytorch:24.07-py3
    command: ["/bin/bash", "-c"]
    securityContext:
      runAsUser: 0
    args:
    - |
      nvidia-smi | head -5 &&
      pip install -q 'transformers>=4.40,<4.50' 'peft>=0.10,<0.15' 'accelerate>=0.30,<0.35' datasets rouge-score sacrebleu sentencepiece tqdm pyyaml &&
      git clone https://github.com/liangwen12year/TaskMap.git /workspace/TaskMap &&
      cd /workspace/TaskMap &&
      echo "=== Shared LoRA r=8 on Qwen2.5-7B ===" &&
      python -u train.py --mode lora --backbone Qwen/Qwen2.5-7B \
        --lora_rank 8 --lora_alpha 16 --max_steps 3000 \
        --microbatch_size 2 --gradient_accumulation_steps 16 \
        --max_seq_length 1024 \
        --output_dir outputs/lora_r8_7b --seed 42 &&
      echo "=== Shared LoRA 7B eval (500 examples) ===" &&
      python -u run_eval.py --mode lora --backbone Qwen/Qwen2.5-7B \
        --checkpoint outputs/lora_r8_7b/final --lora_rank 8 \
        --output_file outputs/eval_lora_7b.json --max_examples 500 &&
      echo "=== RESULTS ===" && cat outputs/eval_lora_7b.json &&
      echo "=== DONE ==="
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 80Gi
        cpu: "16"
      requests:
        nvidia.com/gpu: 1
        memory: 64Gi
        cpu: "8"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: workspace
    emptyDir:
      sizeLimit: 100Gi
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 32Gi
