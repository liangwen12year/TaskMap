apiVersion: v1
kind: Pod
metadata:
  name: taskmap-lora-r32
  namespace: taskmap-training
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: pokprod-b93r38s1
  containers:
  - name: trainer
    image: nvcr.io/nvidia/pytorch:24.07-py3
    command: ["/bin/bash", "-c"]
    securityContext:
      runAsUser: 0
    args:
    - |
      nvidia-smi | head -5 &&
      pip install -q 'transformers>=4.40,<4.50' 'peft>=0.10,<0.15' 'accelerate>=0.30,<0.35' datasets rouge-score sacrebleu sentencepiece tqdm pyyaml &&
      git clone https://github.com/liangwen12year/TaskMap.git /workspace/TaskMap &&
      cd /workspace/TaskMap &&
      echo "=== LoRA r=32 training ===" &&
      python -u train.py --mode lora --backbone Qwen/Qwen2.5-1.5B \
        --lora_rank 32 --lora_alpha 64 --max_steps 12000 \
        --microbatch_size 4 --gradient_accumulation_steps 4 \
        --max_seq_length 2048 \
        --output_dir outputs/lora_r32 --seed 42 &&
      echo "=== LoRA r=32 eval ===" &&
      python -u run_eval.py --mode lora --backbone Qwen/Qwen2.5-1.5B \
        --checkpoint outputs/lora_r32/final --lora_rank 32 \
        --output_file outputs/eval_lora_r32.json --max_examples 500 &&
      echo "=== RESULTS ===" && cat outputs/eval_lora_r32.json &&
      echo "=== DONE ==="
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 80Gi
        cpu: "16"
      requests:
        nvidia.com/gpu: 1
        memory: 40Gi
        cpu: "8"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: workspace
    emptyDir:
      sizeLimit: 100Gi
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 16Gi
