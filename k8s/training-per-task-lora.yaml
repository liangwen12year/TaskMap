apiVersion: v1
kind: Pod
metadata:
  name: taskmap-per-task-lora
  namespace: taskmap-training
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: pokprod-b93r38s1
  containers:
  - name: trainer
    image: nvcr.io/nvidia/pytorch:24.07-py3
    command: ["/bin/bash", "-c"]
    securityContext:
      runAsUser: 0
    args:
    - |
      nvidia-smi | head -5 &&
      pip install -q 'transformers>=4.40,<4.50' 'peft>=0.10,<0.15' 'accelerate>=0.30,<0.35' datasets rouge-score sacrebleu sentencepiece tqdm pyyaml &&
      git clone https://github.com/liangwen12year/TaskMap.git /workspace/TaskMap &&
      cd /workspace/TaskMap &&
      echo "=== Per-task LoRA r=8 on Qwen2.5-1.5B ===" &&
      python -u train_per_task_lora.py \
        --backbone Qwen/Qwen2.5-1.5B \
        --lora_rank 8 --lora_alpha 16 \
        --steps_per_task 2000 \
        --microbatch_size 4 --gradient_accumulation_steps 8 \
        --max_seq_length 2048 \
        --max_eval_examples 500 \
        --seed 42 \
        --output_dir outputs/per_task_lora &&
      echo "=== DONE ==="
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 80Gi
        cpu: "16"
      requests:
        nvidia.com/gpu: 1
        memory: 64Gi
        cpu: "8"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: workspace
    emptyDir:
      sizeLimit: 100Gi
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 32Gi
